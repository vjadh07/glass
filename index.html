<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Glass — breath fog mirror</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: #090d11;
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; }

  #stage { position: fixed; inset: 0; }
  #cam   { position: absolute; inset: 0; width: 100%; height: 100%;
           object-fit: cover; transform: scaleX(-1); background: #090d11; }
  #fog   { position: absolute; inset: 0; width: 100%; height: 100%;
           touch-action: none; cursor: crosshair; }

  #hint  { position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%);
           color: rgba(255,255,255,.62); font-size: 13.5px; letter-spacing: .03em;
           text-align: center; pointer-events: none; transition: opacity .8s;
           text-shadow: 0 1px 4px rgba(0,0,0,.6); white-space: nowrap; }
  #hint b { color: rgba(255,255,255,.85); font-weight: 600; }

  #status { position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
            color: rgba(255,255,255,.4); font-size: 12px; letter-spacing: .05em;
            pointer-events: none; text-align: center; max-width: 90vw; }

  #start { position: fixed; inset: 0; z-index: 10; display: flex; gap: 20px;
           flex-direction: column; align-items: center; justify-content: center;
           color: #eaf2f8; text-align: center; padding: 24px;
           background: radial-gradient(circle at 50% 38%, #1a2632, #090d11 70%);
           transition: opacity .8s; }
  #start h1 { font-weight: 200; font-size: clamp(34px, 9vw, 56px); letter-spacing: .22em;
              text-indent: .22em; }
  #start p  { color: rgba(234,242,248,.6); font-weight: 300; max-width: 360px;
              line-height: 1.65; font-size: 15px; }
  #start button { margin-top: 6px; padding: 13px 36px; font-size: 14px; letter-spacing: .12em;
                  color: #0a0e12; background: #eaf2f8; border: none; border-radius: 999px;
                  cursor: pointer; transition: transform .15s ease, background .15s; }
  #start button:hover { transform: translateY(-2px); background: #fff; }
  #start small { color: rgba(234,242,248,.34); font-size: 12px; }
  #err { color: #ff9a8a; font-size: 13px; min-height: 16px; max-width: 360px; }
  .gone { opacity: 0 !important; pointer-events: none; }
</style>
</head>
<body>
  <div id="stage">
    <video id="cam" autoplay playsinline muted></video>
    <canvas id="fog"></canvas>
  </div>

  <div id="status"></div>
  <div id="hint">breathe on the glass to fog it &middot; <b>point</b> your index finger to write &middot; hold <b>space</b> to fog &middot; <b>c</b> clears</div>

  <div id="start">
    <h1>GLASS</h1>
    <p>A foggy mirror in your browser. Breathe to fog it up, then draw on the glass with your fingertip.</p>
    <button id="go">Enter</button>
    <div id="err"></div>
    <small>needs camera + mic &middot; everything stays on your device</small>
  </div>

<script type="module">
import { HandLandmarker, FilesetResolver }
  from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

const video   = document.getElementById("cam");
const canvas  = document.getElementById("fog");
const ctx     = canvas.getContext("2d");
const startEl = document.getElementById("start");
const errEl   = document.getElementById("err");
const hintEl  = document.getElementById("hint");
const statusEl= document.getElementById("status");

// ---- tunables ---------------------------------------------------------------
// fog appearance (a blurred, brightened, frosted copy of the live video)
const BLUR_PX        = 14;              // how soft the fogged glass is
const FOG_BRIGHT     = 1.45;            // fogged glass is brighter than the room
const FOG_SAT        = 0.55;            // fog washes the colour out
const FOG_TINT       = "rgba(228,236,244,0.40)"; // cool frosted wash
const FROST_ALPHA    = 0.55;           // strength of the static frost texture

// fog density (the persistent mask: white = fogged, erased = clear)
const INITIAL_FOG    = 1.0;            // start fully fogged
const AMBIENT_REFOG  = 0.0004;         // gentle haze return (~90s); writing persists
const BREATH_REFOG   = 0.05;           // extra fog per frame at full breath
const SPACE_REFOG    = 0.05;           // fog per frame while holding space

// wiping
const BRUSH_DIAM     = 26;             // stroke width (css px) - keep it fingertip-sized
const BRUSH_FEATHER  = 1.2;            // soft edge on the wipe (px of blur)
const TIP_PROJECT    = 0.35;           // push the brush past landmark 8 to the very tip
const SMOOTH_MINCUT  = 1.6;            // One Euro: lower = smoother but laggier
const SMOOTH_BETA    = 0.02;           // One Euro: higher = more responsive when moving fast

// breath detection
const VOL_GATE       = 0.045;          // min RMS to count as breath
const FLAT_GATE      = 0.18;           // min spectral flatness (noise-like)
// -----------------------------------------------------------------------------

let w = 0, h = 0, dpr = 1;
let handLandmarker = null;
let lastVideoTime = -1;
let handResult = null;
let pointerDown = false, pointerPt = null;
let spaceDown = false;
let breath = 0;           // smoothed breath intensity 0..1

// offscreen layers
const maskCanvas = document.createElement("canvas");   // fog density map
const maskCtx    = maskCanvas.getContext("2d");
const blurCanvas = document.createElement("canvas");   // low-res video for cheap blur
const blurCtx    = blurCanvas.getContext("2d");
let frostPattern = null;                               // static frosted-glass texture

// ---- sizing -----------------------------------------------------------------
function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  w = window.innerWidth; h = window.innerHeight;

  canvas.width  = maskCanvas.width  = Math.round(w * dpr);
  canvas.height = maskCanvas.height = Math.round(h * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  maskCtx.setTransform(dpr, 0, 0, dpr, 0, 0);

  // low-res buffer for the blurred video, same aspect as the screen
  const bw = Math.max(160, Math.min(480, Math.round(w / 4)));
  blurCanvas.width  = bw;
  blurCanvas.height = Math.max(1, Math.round(bw * h / w));

  frostPattern = ctx.createPattern(makeFrost(480), "repeat");
  fillFog(INITIAL_FOG);
}
function fillFog(alpha) {
  maskCtx.globalCompositeOperation = "source-over";
  maskCtx.fillStyle = `rgba(255,255,255,${alpha})`;
  maskCtx.fillRect(0, 0, w, h);
}
window.addEventListener("resize", resize);

// ---- frosted-glass texture (generated once) ---------------------------------
function makeFrost(tile) {
  const c = document.createElement("canvas");
  c.width = c.height = tile;
  const x = c.getContext("2d");

  // soft dappled condensation: blur up some coarse noise
  const s = document.createElement("canvas");
  s.width = s.height = tile >> 2;
  const sx = s.getContext("2d");
  const img = sx.createImageData(s.width, s.height);
  for (let i = 0; i < img.data.length; i += 4) {
    img.data[i] = img.data[i + 1] = img.data[i + 2] = 255;
    img.data[i + 3] = Math.random() * 70;            // varied droplet density
  }
  sx.putImageData(img, 0, 0);
  x.filter = "blur(2px)";
  x.drawImage(s, 0, 0, tile, tile);
  x.filter = "none";

  // fine micro-grain on top so it doesn't look smudgy
  for (let i = 0; i < tile * tile * 0.04; i++) {
    x.fillStyle = `rgba(255,255,255,${Math.random() * 0.05})`;
    x.fillRect((Math.random() * tile) | 0, (Math.random() * tile) | 0, 1, 1);
  }
  return c;
}

// ---- fog density (mask) -----------------------------------------------------
function refogMask() {
  let a = AMBIENT_REFOG;
  if (spaceDown) a += SPACE_REFOG;
  a += BREATH_REFOG * breath;
  if (a <= 0) return;
  maskCtx.globalCompositeOperation = "source-over";
  maskCtx.fillStyle = `rgba(255,255,255,${Math.min(a, 1)})`;
  maskCtx.fillRect(0, 0, w, h);
}
// One Euro filter: smooths the noisy fingertip without adding much lag.
function lowpass(prev, x, a) { return a * x + (1 - a) * prev; }
function smoothAlpha(cutoff, dt) { const tau = 1 / (2 * Math.PI * cutoff); return 1 / (1 + tau / dt); }
class OneEuro {
  constructor(minCutoff, beta, dCutoff = 1) {
    this.minCutoff = minCutoff; this.beta = beta; this.dCutoff = dCutoff;
    this.xPrev = null; this.dxPrev = 0; this.tPrev = 0;
  }
  reset() { this.xPrev = null; this.dxPrev = 0; }
  filter(x, t) {
    if (this.xPrev === null) { this.xPrev = x; this.tPrev = t; return x; }
    const dt = Math.max(1e-3, (t - this.tPrev) / 1000);
    this.tPrev = t;
    const dx = (x - this.xPrev) / dt;
    const dxHat = lowpass(this.dxPrev, dx, smoothAlpha(this.dCutoff, dt));
    this.dxPrev = dxHat;
    const cutoff = this.minCutoff + this.beta * Math.abs(dxHat);
    const xHat = lowpass(this.xPrev, x, smoothAlpha(cutoff, dt));
    this.xPrev = xHat;
    return xHat;
  }
}

// A "pen" erases the mask as one continuous, smooth stroke (quadratic curves
// through the midpoints), so there are no lumpy stacked blobs.
function makePen() {
  return { active: false, prevPt: null, prevMid: null,
           fx: new OneEuro(SMOOTH_MINCUT, SMOOTH_BETA), fy: new OneEuro(SMOOTH_MINCUT, SMOOTH_BETA) };
}
function beginErase() {
  maskCtx.globalCompositeOperation = "destination-out";
  maskCtx.strokeStyle = maskCtx.fillStyle = "rgba(0,0,0,1)";  // full erase = no cross-frame buildup
  maskCtx.lineWidth = BRUSH_DIAM;
  maskCtx.lineCap = maskCtx.lineJoin = "round";
  maskCtx.filter = `blur(${BRUSH_FEATHER}px)`;                 // soft edge
}
function penStroke(pen, x, y) {
  if (!pen.active) {                                           // pen down: a single round dot
    pen.active = true; pen.prevPt = { x, y }; pen.prevMid = { x, y };
    beginErase();
    maskCtx.beginPath(); maskCtx.arc(x, y, BRUSH_DIAM / 2, 0, Math.PI * 2); maskCtx.fill();
    maskCtx.filter = "none";
    return;
  }
  const mid = { x: (pen.prevPt.x + x) / 2, y: (pen.prevPt.y + y) / 2 };
  beginErase();
  maskCtx.beginPath();
  maskCtx.moveTo(pen.prevMid.x, pen.prevMid.y);
  maskCtx.quadraticCurveTo(pen.prevPt.x, pen.prevPt.y, mid.x, mid.y);
  maskCtx.stroke();
  maskCtx.filter = "none";
  pen.prevPt = { x, y }; pen.prevMid = mid;
}
function penUp(pen) { pen.active = false; pen.prevPt = pen.prevMid = null; pen.fx.reset(); pen.fy.reset(); }

const handPen = makePen();
const pointerPen = makePen();

// ---- fog appearance + composite ---------------------------------------------
function coverDrawMirrored(dctx, vid, dw, dh) {
  const vw = vid.videoWidth || 16, vh = vid.videoHeight || 9;
  const scale = Math.max(dw / vw, dh / vh);
  const sw = vw * scale, sh = vh * scale;
  const dx = (dw - sw) / 2, dy = (dh - sh) / 2;
  dctx.setTransform(1, 0, 0, 1, 0, 0);
  dctx.clearRect(0, 0, dw, dh);
  dctx.translate(dw, 0); dctx.scale(-1, 1);            // mirror to match #cam
  dctx.drawImage(vid, dw - dx - sw, dy, sw, sh);
  dctx.setTransform(1, 0, 0, 1, 0, 0);
}
function compose() {
  coverDrawMirrored(blurCtx, video, blurCanvas.width, blurCanvas.height);

  ctx.save();
  ctx.clearRect(0, 0, w, h);

  // 1. fogged glass = blurred + brightened + desaturated video
  ctx.filter = `blur(${BLUR_PX}px) brightness(${FOG_BRIGHT}) saturate(${FOG_SAT})`;
  ctx.drawImage(blurCanvas, 0, 0, w, h);
  ctx.filter = "none";

  // 2. cool tint + frosted texture so it reads as glass, not just blur
  ctx.fillStyle = FOG_TINT;
  ctx.fillRect(0, 0, w, h);
  if (frostPattern) {
    ctx.globalAlpha = FROST_ALPHA;
    ctx.fillStyle = frostPattern;
    ctx.fillRect(0, 0, w, h);
    ctx.globalAlpha = 1;
  }

  // 3. punch the wiped areas out, revealing the sharp #cam mirror below
  ctx.globalCompositeOperation = "destination-in";
  ctx.drawImage(maskCanvas, 0, 0, w, h);
  ctx.restore();
}

// ---- pointing-gesture detection (wipe only with the index finger) -----------
function isPointing(lm) {
  const wrist = lm[0];
  const d = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);
  const extended = (tip, pip) => d(lm[tip], wrist) > d(lm[pip], wrist) * 1.1;
  const curled   = (tip, pip) => d(lm[tip], wrist) < d(lm[pip], wrist) * 1.05;
  if (!extended(8, 6)) return false;                  // index must be extended
  let down = 0;                                       // and the others mostly folded
  if (curled(12, 10)) down++;
  if (curled(16, 14)) down++;
  if (curled(20, 18)) down++;
  return down >= 2;
}

// ---- breath detection -------------------------------------------------------
let analyser = null, timeBuf = null, freqBuf = null;
function setupAudio(stream) {
  const AC = window.AudioContext || window.webkitAudioContext;
  const ac = new AC();
  if (ac.state === "suspended") ac.resume();
  const src = ac.createMediaStreamSource(stream);
  analyser = ac.createAnalyser();
  analyser.fftSize = 1024;
  analyser.smoothingTimeConstant = 0.6;
  src.connect(analyser);
  timeBuf = new Uint8Array(analyser.fftSize);
  freqBuf = new Uint8Array(analyser.frequencyBinCount);
}
function updateBreath() {
  let target = 0;
  if (analyser) {
    analyser.getByteTimeDomainData(timeBuf);
    let sum = 0;
    for (let i = 0; i < timeBuf.length; i++) {
      const v = (timeBuf[i] - 128) / 128;
      sum += v * v;
    }
    const rms = Math.sqrt(sum / timeBuf.length);

    // spectral flatness over the low/mid band -> noise = ~1, tone = ~0
    analyser.getByteFrequencyData(freqBuf);
    const band = Math.min(freqBuf.length, 220);
    let logSum = 0, linSum = 0, n = 0;
    for (let i = 1; i < band; i++) {
      const m = freqBuf[i] / 255 + 1e-6;
      logSum += Math.log(m); linSum += m; n++;
    }
    const flatness = n ? Math.exp(logSum / n) / (linSum / n) : 0;

    if (rms > VOL_GATE && flatness > FLAT_GATE) {
      target = Math.min(1, (rms - VOL_GATE) * 9);
    }
  }
  // attack fast, release slow so fog keeps spreading a beat after the breath
  breath += (target - breath) * (target > breath ? 0.5 : 0.06);
  if (breath < 0.001) breath = 0;
}

// ---- main loop --------------------------------------------------------------
function loop() {
  let freshHand = false;
  if (handLandmarker && video.readyState >= 2 && video.currentTime !== lastVideoTime) {
    lastVideoTime = video.currentTime;
    try { handResult = handLandmarker.detectForVideo(video, performance.now()); freshHand = true; }
    catch (e) { /* transient frame errors are fine */ }
  }

  updateBreath();
  refogMask();                                        // add fog first...

  // ...then wipe, so the stroke stays clear this frame.
  // Act only on a fresh detection so the One Euro filter sees real timing.
  if (freshHand) {
    const hand = handResult && handResult.landmarks && handResult.landmarks[0];
    if (hand && isPointing(hand)) {
      // map index tip (8) and dip (7) to mirrored screen space, then push the
      // brush a little past the tip so it sits at the very fingertip
      const sx8 = (1 - hand[8].x) * w, sy8 = hand[8].y * h;
      const sx7 = (1 - hand[7].x) * w, sy7 = hand[7].y * h;
      const tipX = sx8 + (sx8 - sx7) * TIP_PROJECT;
      const tipY = sy8 + (sy8 - sy7) * TIP_PROJECT;
      const t = performance.now();
      penStroke(handPen, handPen.fx.filter(tipX, t), handPen.fy.filter(tipY, t));
    } else {
      penUp(handPen);                                 // lift the pen when not pointing
    }
  }

  if (pointerDown && pointerPt) penStroke(pointerPen, pointerPt.x, pointerPt.y);
  else if (pointerPen.active) penUp(pointerPen);

  compose();
  requestAnimationFrame(loop);
}

// ---- pointer fallback (works without a camera) ------------------------------
canvas.addEventListener("pointerdown", (e) => { pointerDown = true; pointerPt = { x: e.clientX, y: e.clientY }; });
canvas.addEventListener("pointermove", (e) => { if (pointerDown) pointerPt = { x: e.clientX, y: e.clientY }; });
const dropPointer = () => { pointerDown = false; };
canvas.addEventListener("pointerup", dropPointer);
canvas.addEventListener("pointerleave", dropPointer);

// ---- keys -------------------------------------------------------------------
window.addEventListener("keydown", (e) => {
  if (e.code === "Space") { spaceDown = true; e.preventDefault(); }
  if (e.key === "c" || e.key === "C") {               // wipe everything clear
    maskCtx.globalCompositeOperation = "destination-out";
    maskCtx.fillStyle = "rgba(0,0,0,1)";
    maskCtx.fillRect(0, 0, w, h);
  }
});
window.addEventListener("keyup", (e) => { if (e.code === "Space") spaceDown = false; });

// ---- startup ----------------------------------------------------------------
async function setupHands() {
  const fileset = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm");
  handLandmarker = await HandLandmarker.createFromOptions(fileset, {
    baseOptions: {
      modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
      delegate: "GPU",
    },
    runningMode: "VIDEO",
    numHands: 1,
  });
}

document.getElementById("go").addEventListener("click", async () => {
  errEl.textContent = "";
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false },
    });
    video.srcObject = stream;
    await video.play();
    setupAudio(stream);

    resize();
    startEl.classList.add("gone");
    loop();                         // start the mirror immediately
    statusEl.textContent = "loading hand tracking…";

    try {
      await setupHands();           // hand model loads in the background
      statusEl.textContent = "";
    } catch (e) {
      statusEl.textContent = "hand tracking unavailable — use your mouse to wipe";
    }

    setTimeout(() => hintEl.classList.add("gone"), 9000);
  } catch (e) {
    errEl.textContent = "Couldn't get camera/mic access — check permissions and that you're on http://localhost.";
    console.error(e);
  }
});
</script>
</body>
</html>
